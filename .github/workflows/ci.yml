name: CI

on:
  push:
    branches: [main, improvements, feature/gamification, feature/new-features]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["20.9", "24"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test:run
      - run: npm run build
        env:
          # Placeholders so module import (lazy DB client, auth config) succeeds;
          # no real connection is made during a static build.
          DATABASE_URL: "postgres://ci:ci@localhost:5432/ci"
          AUTH_SECRET: "ci-placeholder-secret-not-used-at-build-time"
